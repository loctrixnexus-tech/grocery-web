<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout</title>
  <link rel="stylesheet" href="css/check.css">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="top-bar">
    <div class="top-left" id="locationBtn">
      📍 Deliver to: <span>Enter Location</span>
    </div>

    <div class="top-right">
      📞 Call:+91 62053 38603
    </div>
  </div>

  <!-- NAVBAR -->
  
<div class="container">

  <h1>Checkout</h1>

  <div class="checkout-grid">

    <!-- LEFT: ORDER SUMMARY -->
    <div class="card glass">
      <h3>Order Summary</h3>
      <div id="orderItems"></div>
    </div>

    <!-- RIGHT: ADDRESS -->
    <div class="card glass">

      <h3>Delivery Address</h3>

      <div id="savedAddress" class="address-box">
        No address added
      </div>

      <button class="btn-outline" onclick="openPopup()">+ Add Address</button>

      <h2>Total: ₹<span id="total">0</span></h2>

      <button class="btn-primary" onclick="placeOrder()">Place Order</button>

    </div>

  </div>

</div>

<!-- POPUP -->
<div id="popup" class="popup">

  <div class="popup-content glass">

    <span class="close" onclick="closePopup()">✖</span>

    <h3>Add Address</h3>
<input id="name" placeholder="Full Name">
<input id="phone" placeholder="Phone Number">

<!-- ✅ ADD OTP HERE -->
<button onclick="sendOTP()" class="btn-outline">Send OTP</button>

<div id="otpBox" style="display:none;">
  <input id="otpInput" placeholder="Enter OTP">
  <button onclick="verifyOTP()" class="btn-primary">Verify OTP</button>
</div>

<input id="address" placeholder="Full Address">
<input id="city" placeholder="City">
<input id="pincode" placeholder="Pincode">

    <button class="btn-primary" onclick="saveAddress()">Save Address</button>

  </div>

</div>

<script src="js/check.js"></script>
  <a href="https://wa.me/916205338603?text=Hello%20I%20want%20to%20place%20an%20order"
   class="whatsapp-btn"
   target="_blank">

    <span>Click to chat</span>

  <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" alt="whatsapp">

</body>
</html>
